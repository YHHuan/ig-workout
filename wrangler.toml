# Cloudflare Workers config for the ig-workout static site.
# Workers Builds auto-detects this and runs the site/ build.

name = "ig-workout"
compatibility_date = "2026-04-01"

# Build command + working dir (CF Workers Builds runs these).
[build]
command = "cd site && npm install && npm run build"
cwd = "."

# The static build output lives in site/dist after `npm run build`.
[assets]
directory = "site/dist"
not_found_handling = "single-page-application"
